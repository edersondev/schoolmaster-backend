name: schoolmaster-backend

services:
  app:
    build: .
    image: schoolmaster/php:8.3
    volumes:
      - ../:/var/www/html
      - ../../schoolmaster-specs:/var/www/schoolmaster-specs:ro
      - ../../schoolmaster-specs:/schoolmaster-specs:ro
    networks:
      default:
        aliases:
          - ${SERVERNAME_REST}
    environment:
      #SERVER_NAME: ${SERVERNAME_REST}
      DOCUMENT_ROOT: public
    depends_on:
      dbmysql:
        condition: service_healthy
    ports:
      - "8001:80"

  dbmysql:
    image: mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "${DB_FORWARD_PORT}:3306"
    volumes:
      - appdb:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  appdb:
